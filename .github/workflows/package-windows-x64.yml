name: Package Windows x64

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '手动输入要发布的标签（示例：v1.0.0）'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi

          if [[ ! "$TAG_NAME" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "标签格式不合法：$TAG_NAME（需以 v 开头，例如 v1.0.0）"
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "exe_name=bilibili-danmuji-$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_name=bilibili-danmuji-windows-x64-$TAG_NAME.zip" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug Python env
        shell: pwsh
        run: |
          python -V
          python -c "import sys; print(sys.executable)"
          $httpPkg = pip list | Select-String -Pattern "^http\s" -CaseSensitive:$false
          if ($httpPkg) { Write-Host "WARNING: http package installed: $httpPkg" } else { Write-Host "http package not installed (OK)" }

      - name: Check stdlib shadowing
        shell: pwsh
        run: |
          if (Test-Path http.py) { throw "Found shadowing file: http.py" }
          if (Test-Path http/__init__.py) { throw "Found shadowing file: http/__init__.py" }

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          pip uninstall -y http 2>$null; Write-Host "http uninstall done (or not installed)"
          pip install pyinstaller qrcode[pil] brotli psutil

      - name: Build Windows executable (x64)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean bilipdj_onedir.spec
          Rename-Item "dist\bilipdj\bilipdj.exe" "${{ steps.resolve_tag.outputs.exe_name }}.exe"

      - name: Create release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          Copy-Item -Recurse "dist\bilipdj\*" package\
          if (Test-Path README.md)           { Copy-Item README.md           package\ }
          if (Test-Path core\quanxian.yaml)  { Copy-Item core\quanxian.yaml  package\ }
          if (Test-Path core\kaiguan.yaml)   { Copy-Item core\kaiguan.yaml   package\ }
          Compress-Archive -Path package\* -DestinationPath "${{ steps.resolve_tag.outputs.zip_name }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-danmuji-windows-x64-${{ steps.resolve_tag.outputs.tag_name }}
          path: ${{ steps.resolve_tag.outputs.zip_name }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.resolve_tag.outputs.tag_name }}
          commit: ${{ github.sha }}
          name: ${{ steps.resolve_tag.outputs.tag_name }}
          artifacts: ${{ steps.resolve_tag.outputs.zip_name }}
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
