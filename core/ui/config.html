<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>弹幕排队姬 - 登录配置</title>
    <style>
        body {
            margin: 0;
            background: #07101e;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,229,255,0.025) 3px, rgba(0,229,255,0.025) 4px),
                radial-gradient(ellipse at 20% 20%, #0d1e36 0%, #060c18 55%, #030608 100%);
            color: #cce8ff;
            font-family: "Microsoft YaHei", "Consolas", monospace;
        }

        .panel {
            position: relative;
            margin: 16px;
            padding: 18px 20px;
            border: 1px solid rgba(0,229,255,0.35);
            border-left: 3px solid #00e5ff;
            border-radius: 0;
            max-width: 980px;
            background: rgba(7, 18, 36, 0.92);
            box-shadow: 0 0 18px rgba(0,229,255,0.12), inset 0 0 30px rgba(0,229,255,0.04);
        }

        .panel::before,
        .panel::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: #00e5ff;
            border-style: solid;
        }
        .panel::before { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        .panel h3 {
            margin: 0 0 16px;
            font-family: "Consolas", monospace;
            font-size: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00e5ff;
            text-shadow: 0 0 8px rgba(0,229,255,0.6);
        }
        .panel h3::before { content: '[ '; opacity: 0.6; }
        .panel h3::after  { content: ' ]'; opacity: 0.6; }

        .row {
            display: flex;
            align-items: center;
            margin: 10px 0;
            gap: 8px;
        }

        label {
            width: 120px;
            flex: 0 0 120px;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1px;
            color: #7ec8e3;
            text-transform: uppercase;
        }

        input,
        textarea {
            flex: 1;
            padding: 7px 10px;
            border-radius: 0;
            border: 1px solid rgba(0,229,255,0.28);
            border-bottom-color: rgba(0,229,255,0.55);
            background: rgba(0,10,22,0.85);
            color: #d4f0ff;
            box-sizing: border-box;
            font-family: "Consolas", monospace;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus,
        textarea:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 0 1px rgba(0,229,255,0.3), 0 0 10px rgba(0,229,255,0.15);
        }

        textarea {
            resize: vertical;
            min-height: 110px;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        button {
            border: 1px solid #00b8d9;
            border-radius: 0;
            padding: 8px 16px;
            background: rgba(0,40,60,0.9);
            color: #00e5ff;
            cursor: pointer;
            font-family: "Consolas", monospace;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: background 0.2s, box-shadow 0.2s, color 0.2s;
        }

        button:hover:not(:disabled) {
            background: rgba(0,229,255,0.12);
            box-shadow: 0 0 10px rgba(0,229,255,0.4), inset 0 0 6px rgba(0,229,255,0.1);
            color: #fff;
        }

        button:disabled {
            cursor: wait;
            opacity: 0.45;
            border-color: rgba(0,184,217,0.35);
        }

        .hint {
            color: #7ec8e3;
            font-size: 13px;
            font-family: "Consolas", monospace;
        }

        .tip {
            margin-top: 10px;
            color: rgba(126,200,227,0.65);
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        .tip::before { content: '// '; opacity: 0.5; }
    </style>
    <link rel="stylesheet" href="pdj_design.css">
</head>
<body>
    <div class="panel">
        <h3>弹幕排队姬 - 登录配置</h3>

        <div class="row">
            <label for="uid">UID</label>
            <input id="uid" type="number" inputmode="numeric" placeholder="扫码登录后可自动识别">
        </div>

        <div class="row">
            <label for="cookie">Cookie</label>
            <textarea id="cookie" rows="4" placeholder="粘贴 Bilibili Cookie，至少包含 SESSDATA"></textarea>
        </div>

        <div class="actions">
            <button id="save-btn" type="button">保存登录</button>
            <button id="qr-btn" type="button">扫码自动获取 Cookie</button>
            <span id="status-text" class="hint">正在初始化页面...</span>
        </div>

        <div class="tip">扫码按钮可立即打开，不需要等待配置读取完成。</div>
    </div>

    <script>
        (function () {
            const uidInput = document.getElementById("uid");
            const cookieInput = document.getElementById("cookie");
            const saveButton = document.getElementById("save-btn");
            const qrButton = document.getElementById("qr-btn");
            const statusText = document.getElementById("status-text");

            let configLoaded = false;
            let busy = false;

            function setStatus(text) {
                statusText.textContent = text;
            }

            function setBusy(nextBusy) {
                busy = !!nextBusy;
                saveButton.disabled = busy;
            }

            async function loadLoginConfig() {
                setStatus("正在读取登录配置...");
                try {
                    const res = await fetch("/api/config/login", { cache: "no-store" });
                    if (!res.ok) {
                        throw new Error("HTTP " + res.status);
                    }
                    const cfg = await res.json();
                    uidInput.value = cfg.uid ? String(cfg.uid) : "";
                    cookieInput.value = cfg.cookie || "";
                    configLoaded = true;
                    setStatus("登录配置已加载，可直接扫码或手动保存。");
                } catch (error) {
                    setStatus("读取登录配置失败：" + error);
                }
            }

            async function saveLoginConfig(options) {
                const opts = options || {};
                const silent = !!opts.silent;
                if (busy) {
                    return false;
                }

                setBusy(true);
                try {
                    const body = {
                        uid: Number(uidInput.value || 0),
                        cookie: (cookieInput.value || "").trim()
                    };
                    const res = await fetch("/api/config/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) {
                        throw new Error("HTTP " + res.status);
                    }

                    const result = await res.json();
                    const resolvedUid = Number(result && result.uid || 0);
                    if (Number.isFinite(resolvedUid) && resolvedUid > 0) {
                        uidInput.value = String(resolvedUid);
                    }

                    const resolvedName = typeof (result && result.uname) === "string"
                        ? result.uname.trim()
                        : "";
                    if (silent) {
                        setStatus("登录态已写入配置。");
                    } else {
                        setStatus("保存成功，弹幕连接会自动重连。");
                    }
                    if (resolvedName && resolvedUid > 0) {
                        setStatus(statusText.textContent + " (" + resolvedName + "/" + resolvedUid + ")");
                    }
                    configLoaded = true;
                    return true;
                } catch (error) {
                    setStatus("保存失败：" + error);
                    return false;
                } finally {
                    setBusy(false);
                }
            }

            function openCookieLogin() {
                const popup = window.open("/cookie-login", "pdj-cookie-login", "width=560,height=760");
                if (!popup) {
                    setStatus("弹窗被浏览器拦截，请允许弹窗后重试。");
                    return;
                }
                setStatus(
                    configLoaded
                        ? "已打开扫码页面，请完成扫码后自动回填登录态。"
                        : "已打开扫码页面，后台仍在读取配置，不影响扫码。"
                );
            }

            window.addEventListener("message", function (event) {
                if (!event || !event.data || event.data.type !== "pdj-cookie-ready") {
                    return;
                }
                if (typeof event.data.cookie === "string" && event.data.cookie.trim()) {
                    cookieInput.value = event.data.cookie.trim();
                    const loginUid = Number(event.data.uid || 0);
                    if (Number.isFinite(loginUid) && loginUid > 0) {
                        uidInput.value = String(loginUid);
                    }
                    const loginName = typeof event.data.uname === "string" ? event.data.uname.trim() : "";
                    setStatus(
                        loginName && loginUid > 0
                            ? "扫码成功，已识别账号 " + loginName + "(" + loginUid + ")，正在写入配置..."
                            : "扫码成功，正在写入登录配置..."
                    );
                    void saveLoginConfig({ silent: true });
                }
            });

            saveButton.addEventListener("click", function () {
                void saveLoginConfig();
            });
            qrButton.addEventListener("click", openCookieLogin);

            void loadLoginConfig();
        })();
    </script>
</body>
</html>
